<div class="container py-5">
  <div class="row mb-5 text-center">
    <div class="col-lg-8 mx-auto">
      <h1 class="display-5 fw-bold text-dark">Panel de Control</h1>
      <p class="lead text-muted">
        Bienvenido al sistema de gestión. Seleccione una opción para comenzar.
      </p>
    </div>
  </div>

  <div *ngIf="actions.length === 0" class="alert alert-warning text-center" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    No se encontraron opciones disponibles para tu rol. Por favor, contacta al administrador.
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col" *ngFor="let action of actions">
      <!-- Tarjeta interactiva -->
      <div
        class="card h-100 shadow-sm border-0 hover-card"
        [routerLink]="action.link"
        style="cursor: pointer"
        role="button"
      >
        <div
          class="card-body text-center p-4 d-flex flex-column align-items-center justify-content-center"
        >
          <div class="mb-3">
            <i class="bi {{ action.icon }} fs-1" [ngClass]="action.color"></i>
          </div>
          <h5 class="card-title fw-bold">{{ action.title }}</h5>
          <p class="card-text text-muted small">{{ action.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
