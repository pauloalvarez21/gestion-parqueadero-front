<div class="container py-5 dashboard-container animate-fade-in">
  <div class="row welcome-section text-center">
    <div class="col-lg-8 mx-auto">
      <h1 class="welcome-title">Bienvenido, {{ username || 'Administrador' }}</h1>
      <p class="lead text-muted fs-5">
        Gestión inteligente de flujos de parqueadero y resoluciones oficiales.
      </p>
    </div>
  </div>

  <div *ngIf="actions.length === 0" class="col-12 text-center py-5 glass-panel rounded-lg">
    <i class="bi bi-shield-lock fs-1 text-warning mb-3 d-block"></i>
    <h3 class="fw-bold">Sin Accesos Disponibles</h3>
    <p class="text-muted">No se encontraron opciones asignadas a tu rol actual.</p>
  </div>

  <div class="row g-4 px-lg-4">
    <div class="col-12 col-md-6 col-lg-4 animate-fade-in" *ngFor="let action of actions; let i = index" [style.animation-delay]="i * 0.05 + 's'">
      <!-- Tarjeta Premium -->
      <div
        class="card h-100 action-card"
        [routerLink]="action.link"
        style="cursor: pointer"
      >
        <div class="card-body p-4 d-flex flex-column align-items-center text-center">
          <div class="icon-wrapper">
            <i class="bi {{ action.icon }} fs-1" [ngClass]="action.color"></i>
          </div>
          <h5 class="action-title">{{ action.title }}</h5>
          <p class="action-description">{{ action.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
