<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold text-dark">Directorio de Vehículos</h2>
      <p class="text-muted">Información de vehículos y propietarios registrados.</p>
    </div>
  </div>

  <!-- Buscador -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="input-group">
        <input
          type="text"
          class="form-control"
          placeholder="Buscar por placa..."
          [(ngModel)]="searchPlaca"
          (keyup.enter)="loadVehicles()"
        />
        <button class="btn btn-primary" type="button" (click)="loadVehicles()">
          <i class="bi bi-search"></i> Buscar
        </button>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Placa</th>
            <th>Tipo</th>
            <th>Marca/Modelo</th>
            <th>Propietario</th>
            <th>Contacto</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of vehicles">
            <td class="fw-bold">{{ v.placa }}</td>
            <td>
              <span class="badge bg-secondary">{{ v.tipo }}</span>
            </td>
            <td>
              {{ v.marca }} {{ v.modelo }}
              <span *ngIf="v.color" class="text-muted">({{ v.color }})</span>
            </td>
            <td>{{ v.nombrePropietario || 'N/A' }}</td>
            <td>{{ v.telefonoPropietario || 'N/A' }}</td>
          </tr>
          <tr *ngIf="vehicles.length === 0 && !isLoading">
            <td colspan="5" class="text-center py-4 text-muted">No se encontraron vehículos.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
