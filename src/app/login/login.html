<div class="login-page">
  <div class="login-card">
    <div class="login-header text-center">
      <div class="login-logo-container mb-4">
        <img src="images/logo.png" alt="Logo" class="img-fluid login-logo-img">
      </div>
      <h2 class="fw-bold mb-1">Acceso Seguro</h2>
      <p class="mb-0 opacity-75">Sistema de Gestión de Parqueadero</p>
    </div>

    <div class="login-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Usuario"
            formControlName="username"
            [class.is-invalid]="
              loginForm.get('username')?.invalid && loginForm.get('username')?.touched
            "
          />
          <label for="username">Usuario</label>
        </div>

        <div class="form-floating mb-4">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Contraseña"
            formControlName="password"
            [class.is-invalid]="
              loginForm.get('password')?.invalid && loginForm.get('password')?.touched
            "
          />
          <label for="password">Contraseña</label>
        </div>

        <div
          *ngIf="errorMessage"
          class="alert alert-danger py-2 small text-center mb-4"
          role="alert"
        >
          <i class="bi bi-exclamation-circle me-2"></i> {{ errorMessage }}
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-login w-100 fw-bold"
          [disabled]="isLoading || loginForm.invalid"
        >
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          {{ isLoading ? 'INGRESANDO...' : 'INICIAR SESIÓN' }}
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Modal de Error (Popup) -->
<div
  class="modal fade"
  id="errorModal"
  tabindex="-1"
  aria-labelledby="errorModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="errorModalLabel">Error de Inicio de Sesión</h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body text-center py-4">
        <p class="mb-0 fw-medium fs-5">{{ errorMessage }}</p>
      </div>
      <div class="modal-footer justify-content-center">
        <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
