<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo-container">
        <img src="images/logo.png" alt="Logo" class="login-logo-img">
      </div>
      <h2>Acceso Seguro</h2>
      <p class="mb-0 opacity-75 small fw-bold">Gestión de Parqueo v2.0</p>
    </div>

    <div class="login-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-floating mb-3 shadow-sm rounded-3 overflow-hidden">
          <input
            type="text"
            class="form-control"
            id="username"
            placeholder="Usuario"
            formControlName="username"
            [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          />
          <label for="username">Usuario</label>
        </div>

        <div class="form-floating mb-4 shadow-sm rounded-3 overflow-hidden">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Contraseña"
            formControlName="password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
          <label for="password">Contraseña</label>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger glass-panel text-danger border-danger py-2 small text-center mb-4 animate-fade-in">
          <i class="bi bi-exclamation-circle me-2"></i> {{ errorMessage }}
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-login w-100 fw-bold"
          [disabled]="isLoading || loginForm.invalid"
        >
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          {{ isLoading ? 'VERIFICANDO...' : 'ENTRAR AL SISTEMA' }}
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Modal de Error Premium -->
<div class="modal fade" id="errorModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-panel border-0 shadow-lg" style="border-radius: var(--radius-lg);">
      <div class="modal-body text-center p-5">
        <div class="mb-4">
            <i class="bi bi-shield-lock-fill text-danger" style="font-size: 3.5rem;"></i>
        </div>
        <h3 class="fw-extrabold mb-3">Error de Autenticación</h3>
        <p class="text-muted mb-4">{{ errorMessage }}</p>
        <button type="button" class="btn btn-dark w-100 py-3 rounded-pill fw-bold" data-bs-dismiss="modal">Intentar de nuevo</button>
      </div>
    </div>
  </div>
</div>
